<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>boat game</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            font-family: Arial, sans-serif;
            color: #fff;
        }
        #app {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #hud {
            position: fixed;
            top: 12px;
            left: 12px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 14px;
            border-radius: 8px;
            line-height: 1.5;
            font-size: 12px;
            pointer-events: none;
        }
        kbd {
            background: rgba(0, 0, 0, 0.5);
            padding: 1px 6px;
            border-radius: 4px;
            border: 1px solid #333;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script src="./lib/phaser.js"></script>
    <script type="module" src="./src/main.js"></script>
</body>
</html>
